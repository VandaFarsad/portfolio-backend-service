name: CI/CD to Hetzner

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: conf.test_settings
      SECRET_KEY: django-ci-secret-key-dummy
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DATABASE_ENGINE: postgresql
      DATABASE_NAME: testdb
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Django setup & tests
        run: |
          uv run python manage.py makemigrations --check
          uv run python manage.py migrate --noinput
          uv run pytest

      - name: Build Docker image
        run: docker build --network=host -t portfolio-backend-service .

  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy Staging via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/portfolio/portfolio-backend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            docker build --network=host -t portfolio-backend-service-staging .
            docker rm -f portfolio-backend-staging || true
            docker run -d \
              --name portfolio-backend-staging \
              --env-file .env.staging \
              -p 8002:8000 \
              --network nginx_app-network \
              --restart unless-stopped \
              portfolio-backend-service-staging

  deploy-production:
    name: Deploy to Production
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy Production via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/portfolio/portfolio-backend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            docker build --network=host -t portfolio-backend-service .
            docker rm -f portfolio-backend || true
            docker run -d \
              --name portfolio-backend \
              --env-file .env \
              -p 8000:8000 \
              --network nginx_app-network \
              --restart unless-stopped \
              portfolio-backend-service