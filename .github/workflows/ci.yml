name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Run pytest
        env:
          SECRET_KEY: django-ci-secret-key-dummy
          DJANGO_SETTINGS_MODULE: conf.test_settings
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          DEBUG: "1"
          ALLOWED_HOSTS: "*"
          # Füge weitere aus deinen Settings hinzu
        run: uv run pytest